<script>
  // ── Sidebar Toggle ──
  const sidebar = document.getElementById('sidebar');
  const sidebarToggle = document.getElementById('sidebarToggle');
  let isSidebarOpen = true;

  sidebarToggle.addEventListener('click', () => {
    isSidebarOpen = !isSidebarOpen;
    if (isSidebarOpen) {
      sidebar.classList.remove('w-0', 'opacity-0');
      sidebar.classList.add('w-64');
    } else {
      sidebar.classList.add('w-0', 'opacity-0');
      sidebar.classList.remove('w-64');
    }
  });

  // ── Theme Toggle ──
  const themeToggle = document.getElementById('themeToggle');
  const html = document.documentElement;
  const themeIcon = document.getElementById('themeIcon');

  // Load saved preference
  const savedTheme = localStorage.getItem('xlex-theme') || 'dark';
  applyTheme(savedTheme);

  themeToggle.addEventListener('click', () => {
    const isDark = html.classList.contains('dark');
    applyTheme(isDark ? 'light' : 'dark');
    themeToggle.classList.add('scale-110');
    setTimeout(() => themeToggle.classList.remove('scale-110'), 200);
  });

  function applyTheme(theme) {
    if (theme === 'light') {
      html.classList.remove('dark');
      html.classList.add('light');
      themeIcon.textContent = 'light_mode';
    } else {
      html.classList.remove('light');
      html.classList.add('dark');
      themeIcon.textContent = 'dark_mode';
    }
    try { localStorage.setItem('xlex-theme', theme); } catch(e) {}
  }

  // ── Responsive Sidebar ──
  function handleResize() {
    if (window.innerWidth < 768) {
      if (isSidebarOpen) {
        isSidebarOpen = false;
        sidebar.classList.add('w-0', 'opacity-0');
        sidebar.classList.remove('w-64');
      }
    } else {
      if (!isSidebarOpen) {
        isSidebarOpen = true;
        sidebar.classList.remove('w-0', 'opacity-0');
        sidebar.classList.add('w-64');
      }
    }
  }

  window.addEventListener('resize', handleResize);
  handleResize();
</script>
